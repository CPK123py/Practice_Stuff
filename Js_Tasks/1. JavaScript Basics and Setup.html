<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. JavaScript Basics & Setup</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        section { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <section>
        <h1>Task 1: JavaScript Basics & Setup</h1>
        <p>Open Developer Console (F12) to see the output.</p>
        <div id="output"></div>
    </section>

    <script>
        console.log('Welcome to the Community Portal');
        
        const message = 'Portal loaded successfully';
        console.log(message);
        
        window.addEventListener('load', () => {
            alert('Page loaded - Portal ready!');
            document.getElementById('output').innerHTML = '<p style="color: green;">✓ Console and alert working</p>';
        });

        console.log('Basic script functionality test completed');
    </script>
</body>
</html>
