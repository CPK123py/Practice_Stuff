<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9. Async JS, Promises, Async/Await</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        section { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; }
        h1 { color: #333; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .loading { color: orange; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <section>
        <h1>Task 9: Async JS, Promises, Async/Await</h1>
        <button onclick="fetchWithPromise()">Fetch with Promise</button>
        <button onclick="fetchWithAsync()">Fetch with Async/Await</button>
        <div id="result"></div>
    </section>

    <script>
        function fetchWithPromise() {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result loading';
            resultDiv.textContent = 'Loading...';

            fetch('https://jsonplaceholder.typicode.com/posts?_limit=3')
                .then(response => response.json())
                .then(data => {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `Fetched ${data.length} posts using Promise`;
                    console.log('Promise result:', data);
                })
                .catch(error => {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `Error: ${error.message}`;
                });
        }

        async function fetchWithAsync() {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result loading';
            resultDiv.textContent = 'Loading...';

            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts?_limit=3');
                const data = await response.json();
                resultDiv.className = 'result success';
                resultDiv.textContent = `Fetched ${data.length} posts using Async/Await`;
                console.log('Async result:', data);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
