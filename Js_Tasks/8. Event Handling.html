<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8. Event Handling</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        section { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; }
        h1 { color: #333; }
        input, select { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <section>
        <h1>Task 8: Event Handling</h1>
        <input type="text" id="searchBox" placeholder="Search events...">
        <select id="categoryFilter">
            <option value="">All Categories</option>
            <option value="festival">Festival</option>
            <option value="music">Music</option>
            <option value="gala">Gala</option>
        </select>
        <button onclick="handleSearch()">Search</button>
        <div id="result"></div>
    </section>

    <script>
        const events = [
            { name: 'Harvest Festival', category: 'festival' },
            { name: 'Summer Concert', category: 'music' },
            { name: 'Founders Day Gala', category: 'gala' }
        ];

        document.getElementById('categoryFilter').addEventListener('change', handleFilter);
        document.getElementById('searchBox').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        function handleFilter() {
            const category = document.getElementById('categoryFilter').value;
            if (category) {
                const filtered = events.filter(e => e.category === category);
                displayResults(filtered);
            } else {
                displayResults(events);
            }
        }

        function handleSearch() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const results = events.filter(e => e.name.toLowerCase().includes(query));
            displayResults(results);
        }

        function displayResults(results) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result';
            resultDiv.innerHTML = results.map(e => `<p>${e.name} (${e.category})</p>`).join('');
        }

        handleFilter();
    </script>
</body>
</html>
