<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Nearby Events</title>
    <style>
        .hilight{
            color: aqua;
            font-style: italic;
        }
        .gall{
            height: 100px;
            width: 120px;
            border: 3px solid black;
            object-fit: cover;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
        }
        button:disabled {
            background-color: #ccc;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .loading {
            background-color: #e7f3ff;
            color: #004085;
            display: block;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }
        .coords {
            font-family: monospace;
            background-color: #f0f0f0;
            padding: 10px;
            margin-top: 10px;
        }
        .nearby-events {
            margin-top: 15px;
        }
        .event-item {
            padding: 10px;
            margin: 5px 0;
            background-color: white;
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#home">Home</a> 
        <a href="#events">Events</a> 
        <a href="#about">About</a> 
        <a href="help.html" target="_blank">Help</a>
    </nav>

    <div id="welcomeBanner">
        <h1 class="hilight">Find Nearby Events</h1>
        <span style="color: red;font-weight: bold;">Locate Events Near You</span>
    </div>
    <br>

    <button id="geoBtn" onclick="findNearbyEvents()">Find Nearby Events</button>
    <div id="result" class="result"></div>

    <footer>
        <h3>Pawnee Parks and Rec Department</h3>
    </footer>

    <script>
        const events = [
            { name: 'Harvest Festival', price: 10, lat: 40.2206, lon: -85.1502 },
            { name: 'Summer Concert Series', price: 5, lat: 40.2250, lon: -85.1490 },
            { name: 'Founders Day Gala', price: 20, lat: 40.2180, lon: -85.1550 }
        ];

        function findNearbyEvents() {
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('geoBtn');
            
            if (!navigator.geolocation) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Geolocation not supported';
                return;
            }

            resultDiv.className = 'result loading';
            resultDiv.textContent = 'Getting your location...';
            btn.disabled = true;

            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude, accuracy } = position.coords;
                    displayNearbyEvents(latitude, longitude, accuracy);
                    btn.disabled = false;
                },
                (error) => {
                    let message = 'Error getting location';
                    if (error.code === error.PERMISSION_DENIED) {
                        message = 'Permission denied. Enable location access.';
                    } else if (error.code === error.POSITION_UNAVAILABLE) {
                        message = 'Position unavailable.';
                    } else if (error.code === error.TIMEOUT) {
                        message = 'Request timeout.';
                    }
                    resultDiv.className = 'result error';
                    resultDiv.textContent = message;
                    btn.disabled = false;
                },
                options
            );
        }

        function displayNearbyEvents(lat, lon, accuracy) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result success';
            
            let html = `
                <strong>Your Location:</strong>
                <div class="coords">
                    Latitude: ${lat.toFixed(6)}<br>
                    Longitude: ${lon.toFixed(6)}<br>
                    Accuracy: ±${accuracy.toFixed(2)}m
                </div>
                <div class="nearby-events">
                    <strong>Upcoming Events Near You:</strong>
            `;
            
            events.forEach(event => {
                const distance = calculateDistance(lat, lon, event.lat, event.lon);
                html += `
                    <div class="event-item">
                        ${event.name} - $${event.price}<br>
                        <small>Distance: ${distance.toFixed(1)} km away</small>
                    </div>
                `;
            });
            
            html += '</div>';
            resultDiv.innerHTML = html;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
    </script>
</body>
</html>
