<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="bg-success text-white py-4">
        <div class="container">
            <h1>Forms</h1>
        </div>
    </div>

    <div class="container py-5">
        <section class="mb-5">
            <h2 class="mb-4">Event Registration Form</h2>
            <form>
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com">
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <div class="input-group">
                        <span class="input-group-text">+1</span>
                        <input type="tel" class="form-control" id="phone" placeholder="(555) 123-4567">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="events" class="form-label">Select Event</label>
                    <select class="form-select" id="events">
                        <option selected>Choose an event...</option>
                        <option>Summer Festival</option>
                        <option>Community Picnic</option>
                        <option>Holiday Parade</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Interests</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="music">
                        <label class="form-check-label" for="music">Live Music</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="food">
                        <label class="form-check-label" for="food">Food Vendors</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="family">
                        <label class="form-check-label" for="family">Family Activities</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Register</button>
            </form>
        </section>

        <section>
            <h2 class="mb-4">Login Form with Floating Labels</h2>
            <form>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="loginEmail" placeholder="Email">
                    <label for="loginEmail">Email Address</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="loginPassword" placeholder="Password">
                    <label for="loginPassword">Password</label>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="btn btn-success w-100">Login</button>
            </form>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
