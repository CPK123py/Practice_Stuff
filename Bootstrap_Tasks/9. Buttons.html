<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="bg-warning py-4">
        <div class="container">
            <h1>Buttons</h1>
        </div>
    </div>

    <div class="container py-5">
        <section class="mb-5">
            <h2 class="mb-4">Contextual Button Classes</h2>
            <div class="row mb-4">
                <div class="col-md-6">
                    <p class="fw-bold">Solid Buttons</p>
                    <button class="btn btn-primary me-2">Primary</button>
                    <button class="btn btn-secondary me-2">Secondary</button>
                    <button class="btn btn-success me-2">Success</button>
                    <button class="btn btn-danger me-2">Danger</button>
                    <button class="btn btn-warning me-2">Warning</button>
                    <button class="btn btn-info me-2">Info</button>
                    <button class="btn btn-dark me-2">Dark</button>
                    <button class="btn btn-light border">Light</button>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <p class="fw-bold">Outline Buttons</p>
                    <button class="btn btn-outline-primary me-2">Primary</button>
                    <button class="btn btn-outline-secondary me-2">Secondary</button>
                    <button class="btn btn-outline-success me-2">Success</button>
                    <button class="btn btn-outline-danger me-2">Danger</button>
                    <button class="btn btn-outline-warning me-2">Warning</button>
                    <button class="btn btn-outline-info me-2">Info</button>
                    <button class="btn btn-outline-dark me-2">Dark</button>
                </div>
            </div>
        </section>

        <section class="mb-5">
            <h2 class="mb-4">Button Sizes</h2>
            <div class="mb-3">
                <button class="btn btn-primary btn-lg me-2">Large Button</button>
                <button class="btn btn-primary me-2">Regular Button</button>
                <button class="btn btn-primary btn-sm">Small Button</button>
            </div>
        </section>

        <section class="mb-5">
            <h2 class="mb-4">Button Groups</h2>
            <div class="mb-3">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-primary">Today</button>
                    <button type="button" class="btn btn-outline-primary">Tomorrow</button>
                    <button type="button" class="btn btn-outline-primary">This Week</button>
                </div>
            </div>
        </section>

        <section class="mb-5">
            <h2 class="mb-4">Toggle Buttons with Checkboxes</h2>
            <div class="mb-3">
                <input type="checkbox" class="btn-check" id="option1">
                <label class="btn btn-outline-primary" for="option1">Music</label>

                <input type="checkbox" class="btn-check" id="option2">
                <label class="btn btn-outline-primary" for="option2">Food</label>

                <input type="checkbox" class="btn-check" id="option3">
                <label class="btn btn-outline-primary" for="option3">Games</label>
            </div>
        </section>

        <section>
            <h2 class="mb-4">Disabled State</h2>
            <button class="btn btn-primary" disabled>Disabled Button</button>
            <button class="btn btn-primary">Enabled Button</button>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
